<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MBGStudio Games — Play Online</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0a15;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  overflow-x:hidden;
}
#header{
  width:100%;padding:30px 20px 20px;text-align:center;
  background:linear-gradient(180deg,#14062a 0%,#0a0a15 100%);
  border-bottom:2px solid #1a1a3a;
}
#logo{
  font-size:clamp(28px,8vw,56px);font-weight:900;letter-spacing:4px;
  background:linear-gradient(135deg,#ff3366,#aa00ff,#00d4ff);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 40px rgba(170,0,255,0.4);
  margin-bottom:8px;
}
#tagline{
  font-size:14px;letter-spacing:6px;color:#7a5cb8;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:0.5}50%{opacity:1}}
#games-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:24px;padding:40px 20px;max-width:1200px;width:100%;
}
.game-card{
  position:relative;border-radius:20px;overflow:hidden;
  background:linear-gradient(135deg,#111122,#0d0d20);
  border:2px solid #1a1a3a;cursor:pointer;
  transition:all 0.3s ease;text-decoration:none;color:#fff;
}
.game-card:hover{
  transform:translateY(-8px);box-shadow:0 20px 60px rgba(170,0,255,0.3);
  border-color:#aa00ff;
}
.game-preview{
  width:100%;height:180px;position:relative;overflow:hidden;
  background:#0a0a18;
}
.game-preview canvas{width:100%;height:100%;display:block}
.game-info{padding:20px}
.game-title{
  font-size:22px;font-weight:900;letter-spacing:2px;
  background:linear-gradient(90deg,#ff3366,#aa00ff);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;margin-bottom:6px;
}
.game-desc{font-size:13px;color:#888;line-height:1.5;margin-bottom:12px}
.game-tags{display:flex;gap:8px;flex-wrap:wrap}
.game-tag{
  padding:4px 12px;border-radius:20px;font-size:11px;
  font-weight:700;letter-spacing:1px;
  background:rgba(170,0,255,0.15);color:#aa88ff;
  border:1px solid rgba(170,0,255,0.3);
}
.play-btn{
  display:inline-block;margin-top:10px;padding:12px 28px;
  background:linear-gradient(135deg,#aa00ff,#ff0055);
  border-radius:10px;font-weight:700;font-size:14px;
  letter-spacing:2px;color:#fff;transition:all 0.2s;
  border:none;cursor:pointer;font-family:inherit;
}
.game-card:hover .play-btn{box-shadow:0 0 30px rgba(255,0,100,0.5)}
#footer{
  width:100%;padding:30px;text-align:center;color:#444;
  border-top:1px solid #1a1a3a;margin-top:20px;
  font-size:12px;letter-spacing:2px;
}
#fullscreen-game{
  display:none;position:fixed;inset:0;z-index:999;background:#000;
}
#close-game{
  position:absolute;top:15px;right:20px;z-index:1000;
  background:#ff0055;color:#fff;border:none;padding:12px 24px;
  border-radius:8px;font-weight:900;cursor:pointer;font-size:14px;
  letter-spacing:2px;font-family:inherit;
}
#close-game:hover{background:#ff3366}
#game-container{width:100%;height:100%}
</style>
</head>
<body>

<div id="header">
  <div id="logo">MBGSTUDIO</div>
  <div id="tagline">◆ PLAY ONLINE ◆</div>
</div>

<div id="games-grid">
  <div class="game-card" onclick="openGame()">
    <div class="game-preview"><canvas id="preview-jjk"></canvas></div>
    <div class="game-info">
      <div class="game-title">JJK FIGHTER</div>
      <div class="game-desc">Cursed Arena — 15 playable characters, Domain Expansions, Culling Games survival mode. Play as Yuji, Sukuna, Gojo, and more!</div>
      <div class="game-tags"><span class="game-tag">FIGHTING</span><span class="game-tag">ANIME</span><span class="game-tag">2D</span><span class="game-tag">JJK</span></div>
      <button class="play-btn">▶ PLAY NOW</button>
    </div>
  </div>
</div>

<div id="footer">© 2024 MBGStudio Games — All Rights Reserved</div>

<div id="fullscreen-game">
  <button id="close-game" onclick="closeGame()">✕ CLOSE</button>
  <div id="game-container"></div>
</div>

<script>
// Preview animation
function drawPreview() {
  const c = document.getElementById('preview-jjk');
  const ctx = c.getContext('2d');
  c.width = c.parentElement.clientWidth || 350;
  c.height = 180;
  let t = 0;
  const particles = [];
  for (let i = 0; i < 30; i++) {
    particles.push({
      x: Math.random() * c.width, y: Math.random() * c.height,
      vx: (Math.random() - 0.5) * 1.5, vy: (Math.random() - 0.5) * 1.5,
      r: Math.random() * 2 + 1, color: Math.random() < 0.5 ? '#aa00ff' : '#00d4ff'
    });
  }
  function anim() {
    ctx.fillStyle = '#0a0a18'; ctx.fillRect(0, 0, c.width, c.height);
    ctx.strokeStyle = 'rgba(120,0,220,0.08)'; ctx.lineWidth = 1;
    for (let i = 0; i < c.width; i += 40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, c.height); ctx.stroke(); }
    for (let i = 0; i < c.height; i += 40) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(c.width, i); ctx.stroke(); }
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0 || p.x > c.width) p.vx *= -1;
      if (p.y < 0 || p.y > c.height) p.vy *= -1;
      ctx.fillStyle = p.color; ctx.globalAlpha = 0.6;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    });
    ctx.globalAlpha = 1;
    const gy = c.height * 0.75;
    ctx.strokeStyle = 'rgba(170,50,255,0.5)'; ctx.lineWidth = 2;
    ctx.shadowColor = 'rgba(170,0,255,0.5)'; ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(c.width, gy); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff'; ctx.font = 'bold 20px "Courier New"'; ctx.textAlign = 'center';
    ctx.fillText('CURSED ARENA', c.width / 2, c.height / 2 - 10);
    ctx.fillStyle = '#7a5cb8'; ctx.font = '10px "Courier New"';
    ctx.fillText('◆ JJK FIGHTER ◆', c.width / 2, c.height / 2 + 15);
    t++; requestAnimationFrame(anim);
  }
  anim();
}
drawPreview();

// Game container reference
const gameContainer = document.getElementById('game-container');
const fullscreenGame = document.getElementById('fullscreen-game');

function openGame() {
  fullscreenGame.style.display = 'block';
  // The complete JJK Fighter game HTML will be injected here
  // Due to length, this is the game launcher - the full game code
  // should be placed in a separate file and loaded via iframe
  gameContainer.innerHTML = '<iframe src="about:blank" style="width:100%;height:100%;border:none" id="game-iframe"></iframe>';
  const iframe = document.getElementById('game-iframe');
  // Load the game - for full functionality, save the JJK Fighter HTML
  // as "jjk-fighter.html" in the same folder and use:
  // iframe.src = 'jjk-fighter.html';
  
  // For now, showing a launch message
  iframe.srcdoc = `
    <html>
    <head><style>
      body{background:#05050a;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;font-family:'Courier New',monospace;flex-direction:column}
      h1{font-size:40px;background:linear-gradient(90deg,#ff3366,#aa00ff,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
      p{color:#888;margin:10px;text-align:center}
      .btn{padding:14px 30px;background:linear-gradient(135deg,#aa00ff,#ff0055);border:none;border-radius:10px;color:#fff;font-weight:900;letter-spacing:2px;cursor:pointer;margin-top:20px;font-family:inherit}
    </style></head>
    <body>
      <h1>JJK FIGHTER</h1>
      <p>Cursed Arena is loading...</p>
      <p style="color:#7a5cb8">Place the full game HTML file in the same folder as this website</p>
      <p style="color:#666">Name it: jjk-fighter.html</p>
      <button class="btn" onclick="window.location.reload()">🔄 RETRY</button>
    </body></html>`;
}

function closeGame() {
  fullscreenGame.style.display = 'none';
  gameContainer.innerHTML = 'jjk-fighter.html';
}
</script>
</body>
</html>
