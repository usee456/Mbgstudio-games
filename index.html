<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MBGStudio Games — Play Online</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0a15;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  overflow-x:hidden;
}
#header{
  width:100%;padding:30px 20px 20px;text-align:center;
  background:linear-gradient(180deg,#14062a 0%,#0a0a15 100%);
  border-bottom:2px solid #1a1a3a;
}
#logo{
  font-size:clamp(28px,8vw,56px);font-weight:900;letter-spacing:4px;
  background:linear-gradient(135deg,#ff3366,#aa00ff,#00d4ff);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:8px;
}
#tagline{font-size:14px;letter-spacing:6px;color:#7a5cb8}
#games-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:24px;padding:40px 20px;max-width:1200px;width:100%;
}
.game-card{
  border-radius:20px;overflow:hidden;
  background:linear-gradient(135deg,#111122,#0d0d20);
  border:2px solid #1a1a3a;cursor:pointer;
  transition:all 0.3s ease;
}
.game-card:hover{
  transform:translateY(-8px);box-shadow:0 20px 60px rgba(170,0,255,0.3);
  border-color:#aa00ff;
}
.game-preview{
  width:100%;height:180px;background:#0a0a18;
  display:flex;align-items:center;justify-content:center;
}
.game-preview span{
  font-size:40px;background:linear-gradient(90deg,#ff3366,#aa00ff,#00d4ff);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  font-weight:900;letter-spacing:4px;
}
.game-info{padding:20px}
.game-title{
  font-size:22px;font-weight:900;letter-spacing:2px;
  background:linear-gradient(90deg,#ff3366,#aa00ff);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;margin-bottom:6px;
}
.game-desc{font-size:13px;color:#888;line-height:1.5;margin-bottom:12px}
.game-tags{display:flex;gap:8px;flex-wrap:wrap}
.game-tag{
  padding:4px 12px;border-radius:20px;font-size:11px;
  font-weight:700;background:rgba(170,0,255,0.15);color:#aa88ff;
  border:1px solid rgba(170,0,255,0.3);
}
.play-btn{
  display:block;width:100%;margin-top:12px;padding:14px;
  background:linear-gradient(135deg,#aa00ff,#ff0055);
  border-radius:10px;font-weight:700;font-size:16px;
  letter-spacing:2px;color:#fff;border:none;cursor:pointer;
  font-family:inherit;text-align:center;
}
.play-btn:hover{box-shadow:0 0 30px rgba(255,0,100,0.5)}
#footer{
  width:100%;padding:30px;text-align:center;color:#444;
  border-top:1px solid #1a1a3a;margin-top:20px;
  font-size:12px;letter-spacing:2px;
}
#fullscreen-game{
  display:none;position:fixed;inset:0;z-index:999;background:#000;
}
#close-game{
  position:absolute;top:15px;right:20px;z-index:1000;
  background:#ff0055;color:#fff;border:none;padding:12px 24px;
  border-radius:8px;font-weight:900;cursor:pointer;font-size:14px;
  letter-spacing:2px;font-family:inherit;
}
#close-game:hover{background:#ff3366}
#game-container{width:100%;height:100%}
</style>
</head>
<body>

<div id="header">
  <div id="logo">MBGSTUDIO</div>
  <div id="tagline">◆ PLAY ONLINE ◆</div>
</div>

<div id="games-grid">
  <div class="game-card">
    <div class="game-preview"><span>CURSED ARENA</span></div>
    <div class="game-info">
      <div class="game-title">JJK FIGHTER</div>
      <div class="game-desc">15 playable characters, Domain Expansions, Culling Games survival mode. Play as Yuji, Sukuna, Gojo, and more!</div>
      <div class="game-tags"><span class="game-tag">FIGHTING</span><span class="game-tag">ANIME</span><span class="game-tag">2D</span><span class="game-tag">JJK</span></div>
      <button class="play-btn" onclick="openGame()">▶ PLAY NOW</button>
    </div>
  </div>
</div>

<div id="footer">© 2024 MBGStudio Games</div>

<div id="fullscreen-game">
  <button id="close-game" onclick="closeGame()">✕ CLOSE</button>
  <div id="game-container"></div>
</div>

<script>
const fullscreenGame = document.getElementById('fullscreen-game');
const gameContainer = document.getElementById('game-container');

function openGame() {
  fullscreenGame.style.display = 'block';
  gameContainer.innerHTML = '<iframe src="jjk-fighter.html" style="width:100%;height:100%;border:none" id="game-iframe"></iframe>';
}

function closeGame() {
  fullscreenGame.style.display = 'none';
  gameContainer.innerHTML = '';
}

// Close with Escape key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeGame();
});
</script>
</body>
</html>
