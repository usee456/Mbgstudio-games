*{margin:0;padding:0;box-sizing:border-box;touch-action:manipulation}
body{background:#05050a;color:#fff;font-family:'Courier New',monospace;overflow:hidden;height:100dvh;display:flex;flex-direction:column;user-select:none}
#title-screen{position:fixed;inset:0;background:radial-gradient(ellipse at center,#14062a 0%,#05050a 80%);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px}
#title-main{font-size:clamp(36px,12vw,72px);font-weight:900;letter-spacing:10px;background:linear-gradient(180deg,#ff3366,#aa00ff,#00d4ff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;z-index:2;text-align:center}
#title-sub{font-size:16px;letter-spacing:8px;color:#7a5cb8;z-index:2;animation:pulse 1.6s ease-in-out infinite}

#title-buttons{display:flex;gap:20px;z-index:2}
#title-start,#title-culling{padding:16px 36px;font-family:inherit;font-weight:900;font-size:15px;letter-spacing:3px;border:none;border-radius:12px;cursor:pointer;color:#fff}
#title-start{background:linear-gradient(135deg,#aa00ff,#ff0055);box-shadow:0 0 30px rgba(170,0,255,0.6)}
#title-culling{background:linear-gradient(135deg,#ff4400,#ff8800);box-shadow:0 0 30px rgba(255,80,0,0.6)}
#select-screen{position:fixed;inset:0;background:radial-gradient(ellipse at center,#14062a 0%,#05050a 80%);z-index:100;display:none;flex-direction:column;align-items:center;padding:10px 8px;overflow-y:auto}
#select-header{display:flex;align-items:center;gap:15px;z-index:2;margin-bottom:6px}
#btn-back{padding:10px 20px;font-family:inherit;font-weight:900;font-size:12px;letter-spacing:2px;background:#222;border:1px solid #555;border-radius:8px;cursor:pointer;color:#aaa;z-index:2}
#select-title{font-size:clamp(18px,5vw,28px);font-weight:900;letter-spacing:4px;background:linear-gradient(90deg,#ff3366,#aa00ff,#00d4ff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;z-index:2}
#mode-label{font-size:11px;letter-spacing:4px;color:#ff6600;z-index:2;margin-bottom:8px}
#cards{display:grid;grid-template-columns:repeat(4,minmax(80px,1fr));gap:7px;width:100%;max-width:580px;z-index:2}
.card{position:relative;border:2px solid;border-radius:10px;padding:5px 3px;background:rgba(10,8,20,0.8);cursor:pointer;overflow:hidden;transition:all 0.2s}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 50%,var(--accent) 200%);opacity:0.12;pointer-events:none}
.card:active{transform:scale(0.96)}
.card.selected{transform:scale(1.04);box-shadow:0 0 25px var(--accent);z-index:5;border-width:3px}
.card-avatar{width:38px;height:38px;margin:0 auto 3px;border-radius:50%;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;background:radial-gradient(circle,rgba(255,255,255,0.08),transparent);overflow:hidden}
.card-avatar svg{width:100%;height:100%}
.card-name{font-size:9px;font-weight:900;letter-spacing:1px;text-align:center;color:var(--accent)}
.card-tech{font-size:6px;color:#777;text-align:center}
.card-picker{display:flex;justify-content:center;gap:2px;margin-top:3px;font-size:6px}
.pick-tag{padding:1px 3px;border-radius:3px;border:1px solid var(--accent);color:var(--accent);background:rgba(0,0,0,0.4);font-weight:700;cursor:pointer}
.pick-tag.active{background:var(--accent);color:#000}
#stage-screen{position:fixed;inset:0;background:radial-gradient(ellipse at center,#0a0415 0%,#05050a 80%);z-index:100;display:none;flex-direction:column;align-items:center;padding:15px 10px}
#stage-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:100%;max-width:420px;z-index:2;margin-top:8px}
.stage-card{position:relative;border:3px solid #333;border-radius:14px;overflow:hidden;cursor:pointer;transition:all 0.3s;aspect-ratio:1.6}
.stage-card.selected{border-color:#aa00ff;box-shadow:0 0 30px rgba(170,0,255,0.5)}
.stage-label{position:absolute;bottom:8px;left:0;right:0;font-weight:900;font-size:12px;color:#fff;text-shadow:0 0 10px rgba(0,0,0,0.8);z-index:3;text-align:center}
#stage-confirm{margin-top:12px;padding:14px 40px;font-family:inherit;font-weight:900;font-size:14px;letter-spacing:3px;background:linear-gradient(135deg,#aa00ff,#ff0055);border:none;border-radius:10px;cursor:pointer;color:#fff;z-index:2;box-shadow:0 0 16px rgba(170,0,255,0.5)}
#select-controls{display:flex;gap:10px;margin-top:10px;z-index:2;width:100%;max-width:460px}
.sel-btn{flex:1;padding:12px;font-family:inherit;font-weight:900;font-size:12px;letter-spacing:3px;border:none;border-radius:10px;cursor:pointer;color:#fff}
#btn-next{background:linear-gradient(135deg,#aa00ff,#ff0055);box-shadow:0 0 16px rgba(170,0,255,0.5)}
#btn-next:disabled{background:#2a2a40;box-shadow:none;opacity:0.5}
#btn-random{background:linear-gradient(135deg,#003080,#0066cc)}
#hud{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 12px 5px;gap:8px;background:linear-gradient(180deg,rgba(0,0,0,0.9),rgba(10,5,20,0.7));border-bottom:1px solid #1a1a2e;flex-shrink:0;z-index:5}
.fighter-hud{flex:1}
.portrait{display:flex;align-items:center;gap:5px;margin-bottom:2px}
.portrait-img{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--accent,#fff);overflow:hidden;flex-shrink:0}
.portrait-img svg{width:100%;height:100%}
.fighter-name{font-size:10px;letter-spacing:1.5px;color:var(--accent,#aaa);text-transform:uppercase;font-weight:700}
#p2-hud .portrait{flex-direction:row-reverse}
.hp-bar-bg{height:10px;background:#1a1a2e;border-radius:4px;overflow:hidden}
.hp-bar{height:100%;border-radius:4px;transition:width 0.3s}
#p1-hp-bar{background:linear-gradient(90deg,#00d4ff,#0066ff)}#p2-hp-bar{background:linear-gradient(90deg,#ff3366,#ff0055)}
.ce-bar-bg{height:5px;background:#1a1a2e;border-radius:3px;overflow:hidden;margin-top:2px}
.ce-bar{height:100%;border-radius:3px;transition:width 0.3s}
#p1-ce-bar{background:linear-gradient(90deg,#6600ff,#aa00ff,#ff00aa)}#p2-ce-bar{background:linear-gradient(90deg,#ff6600,#ff3300,#ffcc00)}

#wave-display{color:#ff6600}
#wave-label{font-size:8px;color:#ff8800;letter-spacing:2px}

canvas#game{display:block;width:100%;height:100%}

function upBeam(){if(!beamActive||!beamOwner)return;if(beamOwner.atkT<=0){beamActive=!1;return}const t=beamOwner.id==='p1'?p2:p1;if(t&&Math.abs(t.cx-beamOwner.cx)<40&&!t.inv){t.hp=Math.max(0,t.hp-beamDmg);spDmg(beamDmg,t.cx,t.y,beamColor);t.vx=beamOwner.f*2}}
function drBeam(){if(!beamActive||!beamOwner)return;ctx.save();const x=beamOwner.cx,y=beamOwner.cy,f=beamOwner.f;const g=ctx.createLinearGradient(x,y-8,x+f*canvas.width,y);g.addColorStop(0,'#fff');g.addColorStop(0.1,'#ff8844');g.addColorStop(0.4,'#ff3311');g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.shadowColor='#ff4400';ctx.shadowBlur=30;ctx.fillRect(x,y-12,f*canvas.width,24);ctx.fillStyle='#fff';ctx.fillRect(x,y-4,f*canvas.width,8);ctx.restore()}
function upProj(){projectiles=projectiles.filter(p=>{p.l--;if(p.l<=0)return!1;p.x+=p.vx;p.y+=p.vy;if(p.meteor&&p.y>=p.t.gy-20){p.vy=0;p.vx*=0.95}if(p.ult&&p.y>=p.t.gy)p.y=p.t.gy;const tx=p.t?.cx||0;if(Math.abs(tx-p.x)<(p.meteor?50:p.ult?80:35)&&Math.abs((p.t?.cy||0)-p.y)<(p.meteor?60:p.ult?100:40)&&p.t&&!p.t.inv){let d=p.a.dmg;if(p.ult)d=Math.round(d*1.5);if(p.meteor)d=Math.round(d*1.3);if(p.purple)d=Math.round(d*1.5);if(domainActive&&domainOwner===p.o.id)d=Math.round(d*1.6);if(jackpotActive&&jackpotOwner===p.o.id)d=Math.round(d*1.8);p.t.hp=Math.max(0,p.t.hp-d);p.t.vx=p.o.f*p.a.kb;if(p.a.stun)p.t.stun=p.a.stun;p.t.inv=!0;p.t.invT=16;spDmg(d,tx,p.t.y,p.a.color);if(p.purple||p.meteor||p.ult){screenShake=p.ult?24:p.purple?22:p.meteor?20:14;timeFreeze=p.ult?10:6}return!1}return p.x>-60&&p.x<canvas.width+60&&p.y<canvas.height+100})}
function drProj(){projectiles.forEach(p=>{ctx.save();if(p.purple){const g=ctx.createRadialGradient(p.x,p.y,5,p.x,p.y,45);g.addColorStop(0,'#fff');g.addColorStop(0.2,'#aa88ff');g.addColorStop(0.5,'#6622cc');g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.shadowColor='#8844ff';ctx.shadowBlur=40;ctx.fillRect(p.x-40,p.y-40,80,80)}else if(p.meteor){const g=ctx.createRadialGradient(p.x,p.y,5,p.x,p.y,45);g.addColorStop(0,'#fff');g.addColorStop(0.3,'#ffaa00');g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(p.x-40,p.y-40,80,80)}else if(p.ult){ctx.strokeStyle='#ffff44';ctx.lineWidth=8;ctx.shadowColor='#ffff00';ctx.shadowBlur=40;ctx.beginPath();ctx.moveTo(p.x,p.y-200);ctx.lineTo(p.x,p.y);ctx.stroke()}else{ctx.fillStyle=p.a.color;ctx.shadowColor=p.a.color;ctx.shadowBlur=15;ctx.beginPath();ctx.arc(p.x,p.y,8,0,Math.PI*2);ctx.fill()}ctx.restore()})}
function upSlash(){slashes=slashes.filter(s=>--s.l>0)}
function drSlash(){slashes.forEach(s=>{ctx.save();ctx.globalAlpha=s.l/s.ml;ctx.strokeStyle=s.c;ctx.lineWidth=4;ctx.shadowColor=s.c;ctx.shadowBlur=12;ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x+s.len*Math.cos(s.angle),s.y+s.len*Math.sin(s.angle));ctx.stroke();ctx.restore()})}
function spDmg(d,x,y,c,crit){const el=document.createElement('div');el.className='dmg-num';el.textContent=d;el.style.color=c;el.style.left=(x/canvas.width*100)+'%';el.style.top=(y/canvas.height*100)+'%';document.getElementById('game-wrap').appendChild(el);setTimeout(()=>el.remove(),1200)}
function upParticles(){particles=particles.filter(p=>p.l>0);particles.forEach(p=>{p.l--;p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;ctx.globalAlpha=p.l/50;ctx.fillStyle=p.c;ctx.fillRect(p.x-p.s/2,p.y-p.s/2,p.s,p.s)});ctx.globalAlpha=1}
function drBG(){const w=canvas.width,h=canvas.height,gy=h*GYR,stage=STAGES[selectedStage];const sg=ctx.createLinearGradient(0,0,0,gy);sg.addColorStop(0,stage.skyTop);sg.addColorStop(0.5,stage.skyMid);sg.addColorStop(1,stage.skyBot);if(domainActive&&p1){const dc=domainOwner==='p1'?p1.char:p2?.char;if(dc){sg.addColorStop(0,'#000');sg.addColorStop(0.5,sh(dc.domainColor,-140));sg.addColorStop(1,sh(dc.domainColor,-160))}}ctx.fillStyle=sg;ctx.fillRect(0,0,w,h);bgStars.forEach(s=>{s.tw+=s.sp;ctx.globalAlpha=0.3;ctx.fillStyle='#aaccff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill()});ctx.globalAlpha=1;if(stage.features.includes('buildings')){ctx.fillStyle='#151525';for(let i=0;i<10;i++){ctx.fillRect(i*w/10,gy-40-Math.random()*60,w/10+2,60+Math.random()*40)}}if(stage.features.includes('trees')){for(let i=0;i<8;i++){const tx=i*w/8+Math.random()*15,ty=gy-30-Math.random()*40;ctx.fillStyle='#0a1510';ctx.fillRect(tx-3,ty,6,gy-ty);ctx.fillStyle='#0a2015';ctx.beginPath();ctx.arc(tx,ty,14,0,Math.PI*2);ctx.fill()}}if(stage.features.includes('lava')){for(let i=0;i<5;i++){const lx=w*0.1+i*w*0.2;ctx.fillStyle='#ff4400';ctx.globalAlpha=0.5;ctx.beginPath();ctx.arc(lx,gy-3,18,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffaa00';ctx.globalAlpha=0.4;ctx.beginPath();ctx.arc(lx,gy-8,8,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}if(domainActive){domainStructures.forEach(s=>{if(s.x!==undefined){ctx.fillStyle=s.c;ctx.fillRect(s.x,s.y,s.w,s.h)}if(s.sx!==undefined){ctx.fillStyle=s.c;ctx.beginPath();ctx.arc(s.sx,s.sy,s.sr,0,Math.PI*2);ctx.fill()}if(s.cx!==undefined){ctx.save();ctx.globalAlpha=0.4;ctx.strokeStyle='#ffdd44';ctx.lineWidth=1.5;ctx.translate(s.cx,s.cy);ctx.rotate(Date.now()/2000);ctx.strokeRect(-s.cs/2,-s.cs/2,s.cs,s.cs);ctx.restore()}if(s.fx!==undefined){ctx.fillStyle=s.c;ctx.beginPath();ctx.moveTo(s.fx-10,gy);ctx.lineTo(s.fx,s.fy);ctx.lineTo(s.fx+10,gy);ctx.fill()}})}const gg=ctx.createLinearGradient(0,gy,0,h);gg.addColorStop(0,stage.groundTop);gg.addColorStop(1,'#000');ctx.fillStyle=gg;ctx.fillRect(0,gy,w,h-gy);ctx.strokeStyle=stage.accent;ctx.lineWidth=2;ctx.shadowColor=stage.accent;ctx.shadowBlur=16;ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(w,gy);ctx.stroke();ctx.shadowBlur=0}
function tickDomain(){if(!domainActive)return;domainTimer--;if(domainTimer<=0){domainActive=!1;domainOwner=null;domainData=null;domainStructures=[];return}if(rika)rika.up();if(domainTimer%18===0){const o=domainOwner==='p1'?p1:p2,t=domainOwner==='p1'?p2:p1;if(t&&!t.inv){t.hp=Math.max(0,t.hp-7);spDmg(7,t.cx,t.y,o?.char?.domainColor||'#fff')}}if(jackpotActive){jackpotTimer--;if(jackpotTimer<=0){jackpotActive=!1;jackpotOwner=null}}}
function spawnWave(){cullingWave++;const count=2+Math.floor(cullingWave*1.5);cullingEnemies=[];for(let i=0;i<count;i++){cullingEnemies.push(new CursedEnemy(Math.min(Math.floor(Math.random()*(1+cullingWave*0.6)),3),50+Math.random()*(canvas.width-100)))}document.getElementById('wave-display').textContent=cullingWave;if(cullingWave>=3&&Math.random()<0.2){const bid=Object.keys(ROSTER)[Math.floor(Math.random()*Object.keys(ROSTER).length)];p2=new Fighter('p2',bid,canvas.width-120,!0);p2.y=p2.gy;p2.hp=MAX_HP;p2.ce=MAX_CE;document.getElementById('p2-hud').style.display='block';document.getElementById('p2-portrait').innerHTML=ava(ROSTER[bid]);document.getElementById('p2-name').textContent='BOSS: '+ROSTER[bid].name;showMessage('BOSS!',ROSTER[bid].name);setTimeout(()=>clearMessage(),1800)}else{p2=null;document.getElementById('p2-hud').style.display='none'}}
function upSummons(){summons=summons.filter(s=>s.alive);summons.forEach(s=>s.up())}
function drSummons(){summons.forEach(s=>s.draw(ctx));if(rika)rika.draw(ctx)}
function initGame(){particles=[];projectiles=[];slashes=[];summons=[];domainStructures=[];domainActive=!1;domainOwner=null;domainTimer=0;beamActive=!1;jackpotActive=!1;screenShake=0;timeFreeze=0;rika=null;initBG();if(gameMode==='culling'){cullingWave=0;cullingEnemies=[];cullingKills=0;p1=new Fighter('p1',p1Pick,80,!1);p1.y=p1.gy;p1.ce=MAX_CE;p2=null;document.getElementById('p2-hud').style.display='none';spawnWave()}else{p1=new Fighter('p1',p1Pick,80,!1);p2=new Fighter('p2',p2Pick,canvas.width-120,!0);p1.y=p1.gy;p2.y=p2.gy;if(p1Pick==='yuta')rika=new RikaQueen(p1,p2);if(p2Pick==='yuta')rika=new RikaQueen(p2,p1);document.getElementById('p2-hud').style.display='block'}const a=ROSTER[p1Pick].abilities;document.getElementById('btn-punch-lbl').textContent=a.punch.name;document.getElementById('btn-sp1-lbl').textContent=a.sp1.name;document.getElementById('btn-sp2-lbl').textContent=a.sp2.name;document.getElementById('btn-domain-lbl').textContent=ROSTER[p1Pick].domainName.split(' ')[0];document.getElementById('p1-portrait').innerHTML=ava(ROSTER[p1Pick]);document.getElementById('p1-name').textContent=ROSTER[p1Pick].name;if(gameMode==='vs'){document.getElementById('p2-portrait').innerHTML=ava(ROSTER[p2Pick]);document.getElementById('p2-name').textContent=ROSTER[p2Pick].name}gameState='fighting';if(gameMode==='vs')startTimer()}
function startTimer(){timer=99;document.getElementById('timer').textContent=timer;if(timerI)clearInterval(timerI);timerI=setInterval(()=>{if(gameState!=='fighting')return;timer--;document.getElementById('timer').textContent=timer;if(timer<=0){gameState='gameover';showMessage((p1.hp>p2.hp?p1:p2).name+' WINS!');clearInterval(timerI)}},1000)}
function upHUD(){if(!p1)return;document.getElementById('p1-hp-bar').style.width=(p1.hp/p1.mhp*100)+'%';document.getElementById('p1-ce-bar').style.width=(p1.ce/p1.mce*100)+'%';if(p2){document.getElementById('p2-hp-bar').style.width=(p2.hp/p2.mhp*100)+'%';document.getElementById('p2-ce-bar').style.width=(p2.ce/p2.mce*100)+'%'}document.getElementById('btn-domain').classList.toggle('ready',p1.ce>=100&&!domainActive)}
function showMessage(t,s=''){document.getElementById('overlay-text').textContent=t;document.getElementById('overlay-sub').textContent=s;document.getElementById('overlay').classList.add('show')}
function clearMessage(){document.getElementById('overlay').classList.remove('show')}
const pressed={};
function setupBtns(){['btn-left','btn-right','btn-jump','btn-punch','btn-sp1','btn-sp2','btn-domain'].forEach(id=>{const b=document.getElementById(id);if(!b)return;b.addEventListener('touchstart',e=>{e.preventDefault();hc(id,'down')});b.addEventListener('touchend',e=>{e.preventDefault();hc(id,'up')});b.addEventListener('mousedown',()=>hc(id,'down'));b.addEventListener('mouseup',()=>hc(id,'up'));b.addEventListener('mouseleave',()=>hc(id,'up'))});window.addEventListener('keydown',e=>{if(gameState!=='fighting'||!p1)return;if(e.key==='ArrowLeft'||e.key==='a')pressed.left=!0;if(e.key==='ArrowRight'||e.key==='d')pressed.right=!0;if(e.key==='ArrowUp'||e.key==='w'||e.key===' ')p1.jump();if(e.key==='j')p1.attack('punch',p2||cullingEnemies[0]);if(e.key==='k')p1.attack('sp1',p2||cullingEnemies[0]);if(e.key==='l')p1.attack('sp2',p2||cullingEnemies[0]);if(e.key==='i')p1.activateDomain()});window.addEventListener('keyup',e=>{if(e.key==='ArrowLeft'||e.key==='a')pressed.left=!1;if(e.key==='ArrowRight'||e.key==='d')pressed.right=!1})}
function hc(id,state){if(gameState!=='fighting'||!p1)return;const d=state==='down';switch(id){case'btn-left':pressed.left=d;break;case'btn-right':pressed.right=d;break;case'btn-jump':if(d)p1.jump();break;case'btn-punch':if(d)p1.attack('punch',p2||cullingEnemies[0]);break;case'btn-sp1':if(d)p1.attack('sp1',p2||cullingEnemies[0]);break;case'btn-sp2':if(d)p1.attack('sp2',p2||cullingEnemies[0]);break;case'btn-domain':if(d)p1.activateDomain();break}}
function gameLoop(){requestAnimationFrame(gameLoop);ctx.save();if(screenShake>0){const sx=(Math.random()-0.5)*screenShake,sy=(Math.random()-0.5)*screenShake;ctx.translate(sx,sy);screenShake*=0.85;if(screenShake<0.5)screenShake=0}ctx.clearRect(-30,-30,canvas.width+60,canvas.height+60);drBG();if(introAnim>0){introAnim--;ctx.fillStyle=`rgba(0,0,0,${introAnim/70})`;ctx.fillRect(0,0,canvas.width,canvas.height);if(introAnim===45){showMessage(gameMode==='culling'?'CULLING GAMES':'FIGHT!')}if(introAnim===20)clearMessage()}if(gameState==='fighting'&&p1){if(timeFreeze>0)timeFreeze--;else if(introAnim<=0){if(pressed.left)p1.vx=-MS;if(pressed.right)p1.vx=MS;if(gameMode==='culling'){const t=p2||cullingEnemies[0]||{cx:p1.cx+100,cy:p1.cy,inv:!0,hp:0};p1.up(t);cullingEnemies.forEach(e=>e.up(p1));cullingEnemies=cullingEnemies.filter(e=>{if(e.hp<=0)cullingKills++;return e.hp>0});if(p2){p2.up(p1);if(p2.hp<=0){p2=null;cullingKills+=5;showMessage('BOSS DEFEATED!');setTimeout(()=>clearMessage(),1500)}}if(cullingEnemies.length===0&&!p2){spawnWave();p1.ce=Math.min(MAX_CE,p1.ce+30)}}else{p1.up(p2);p2.up(p1)}if(rika)rika.up();upBeam();upProj();upSlash();upSummons();tickDomain()}if(p1.hp<=0&&gameState==='fighting'){gameState='gameover';showMessage(gameMode==='culling'?'DEFEATED!':'GAME OVER',gameMode==='culling'?'Waves: '+cullingWave+' | Kills: '+cullingKills:'');if(timerI)clearInterval(timerI)}if(gameMode==='vs'&&p2&&p2.hp<=0&&gameState==='fighting'){gameState='gameover';showMessage(p1.name+' WINS!');if(timerI)clearInterval(timerI)}upHUD()}drBeam();drProj();drSlash();if(gameMode==='culling'){cullingEnemies.forEach(e=>e.draw(ctx));if(p2)p2.draw(ctx)}else if(p2)p2.draw(ctx);if(p1)p1.draw(ctx);drSummons();upParticles();ctx.restore()}
document.getElementById('overlay').addEventListener('click',()=>{if(gameState==='gameover')returnToSelect()});
function returnToSelect(){gameState='menu';if(timerI)clearInterval(timerI);document.getElementById('hud').style.display='none';document.getElementById('game-wrap').style.display='none';document.getElementById('controls').style.display='none';document.getElementById('select-screen').style.display='flex';document.getElementById('p2-hud').style.display='block';document.getElementById('timer-box').style.display='block';document.getElementById('wave-box').style.display='none';summons=[];rika=null;jackpotActive=!1;cullingEnemies=[];p2=null;domainStructures=[];beamActive=!1;introAnim=0;clearMessage();refreshS()}
setupBtns();resize();gameLoop();
</script>
</body>
</html>
